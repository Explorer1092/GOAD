- name: Run ESC15
  ansible.windows.win_powershell:
    script: |
      # code from ludus module (also GPL)
      # https://github.com/badsectorlabs/ludus_adcs/blob/main/files/esc15.ps1
      # Import ADCSTemplate module
      Import-Module ADCSTemplate

      # Define the template and group name
      $displayName = "Web Server"
      $groupName = "Domain Users"

      # Use the template name to resolve localized display name if needed
      try {
        Import-Module ActiveDirectory
        $base = "CN=Certificate Templates,CN=Public Key Services,CN=Services,CN=Configuration," + (Get-ADDomain).DistinguishedName
        $tpl = Get-ADObject -LDAPFilter "(name=WebServer)" -SearchBase $base -Properties displayName
        if ($null -ne $tpl -and $tpl.displayName) {
          $displayName = $tpl.displayName
        }
      } catch {
        # keep default display name
      }

      if (-not $displayName) {
        $displayName = "Web 服务器"
      }

      Set-ADCSTemplateACL -DisplayName $displayName -Type Allow -Identity $groupName -Enroll
    error_action: stop
  vars:
    ansible_become: yes
    ansible_become_method: runas
    domain_name: "{{domain}}"
    ansible_become_user: "{{domain_admin}}"
    ansible_become_password: "{{domain_admin_password}}"
